<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AI Stock Monitor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>

    <div class="auth-page">
        <!-- Left Visual Side -->
        <div class="auth-left">
            <div class="hero-bg">
                <div class="grid"></div>
                <div class="blob blob-1"></div>
                <div class="blob blob-2"></div>
            </div>
            <div class="auth-left-content">
                <h2>Welcome Back</h2>
                <p>Log in to access your intelligent dashboard.</p>
            </div>
        </div>

        <!-- Right Form Side -->
        <div class="auth-right">
            <div class="auth-form-container">
                <button class="theme-toggle" id="theme-toggle" style="position:absolute; top:20px; right:20px;">
                    <i class="bi bi-moon-stars-fill"></i>
                </button>
                <a href="index.html" class="logo" style="margin-bottom:32px; display:inline-flex;"><i class="bi bi-robot"></i> AI Stock Monitor</a>
                <h2>Sign In</h2>
                <p class="subtitle">Enter your credentials to continue</p>
                
                <form id="login-form">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" class="form-control" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="form-row">
                        <div class="form-check">
                            <input type="checkbox" id="remember">
                            <label for="remember">Remember me</label>
                        </div>
                        <a href="#" class="forgot-link">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary btn-auth">Login</button>
                </form>

                <div class="divider"><span>OR</span></div>

                <button class="btn-google">
                    <i class="bi bi-google"></i> Continue with Google
                </button>

                <div class="auth-footer">
                    Don't have an account? <a href="register.html">Register</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
    <script src="js/index.js"></script> <!-- Re-used for theme -->
</body>
</html>
