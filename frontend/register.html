<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AI Stock Monitor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>

    <div class="scroll-progress"><div class="scroll-progress-bar" id="scroll-progress-bar"></div></div>

    <div class="auth-page">
        <!-- Left Visual Side -->
        <div class="auth-left">
            <div class="hero-bg">
                <div class="grid"></div>
                <div class="blob blob-1"></div>
                <div class="blob blob-2"></div>
            </div>
            <div class="floater-field" aria-hidden="true">
                <div class="floater floater-lg" style="top:16%; right:12%;" data-speed="0.1" data-drift="16" data-rotate="7">
                    <div class="floater-inner"><i class="bi bi-cash-coin"></i></div>
                </div>
                <div class="floater floater-md spin" style="top:60%; right:18%;" data-speed="0.16" data-drift="-14" data-rotate="-7">
                    <div class="floater-inner"><i class="bi bi-currency-bitcoin"></i></div>
                </div>
                <div class="floater floater-sm signal-up" style="top:35%; left:12%;" data-speed="0.2" data-drift="12" data-rotate="9">
                    <div class="floater-inner"><i class="bi bi-graph-up-arrow"></i></div>
                </div>
                <div class="floater floater-md outline" style="top:80%; left:22%;" data-speed="0.12" data-drift="-10" data-rotate="5">
                    <div class="floater-inner"><i class="bi bi-pie-chart-fill"></i></div>
                </div>
            </div>
            <div class="auth-left-content">
                <h2>Start Monitoring</h2>
                <p>Create your account and build your watchlist.</p>
            </div>
        </div>

        <!-- Right Form Side -->
        <div class="auth-right">
            <div class="auth-form-container">
                <button class="theme-toggle" id="theme-toggle" style="position:absolute; top:20px; right:20px;">
                    <i class="bi bi-moon-stars-fill"></i>
                </button>
                <a href="index.html" class="logo" style="margin-bottom:32px; display:inline-flex;"><i class="bi bi-robot"></i> AI Stock Monitor</a>
                <h2>Create Account</h2>
                <p class="subtitle">Join the future of intelligent investing</p>
                
                <form id="register-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="full-name" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" class="form-control" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <div class="strength-meter" id="strength-meter">
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="form-row" style="margin-top:0;">
                        <div class="form-check">
                            <input type="checkbox" id="terms" required>
                            <label for="terms">I agree to the Terms</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-auth">Create Account</button>
                </form>

                <div class="auth-footer">
                    Already have an account? <a href="login.html">Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/register.js"></script>
    <script src="js/index.js"></script> <!-- Re-used for theme -->
</body>
</html>
