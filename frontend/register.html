<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | AI Stock Monitor</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>

    <div class="auth-page">
        <!-- Left Visual Side -->
        <div class="auth-left">
            <div class="hero-bg">
                <div class="grid"></div>
                <div class="blob blob-1"></div>
                <div class="blob blob-2"></div>
            </div>
            <div class="auth-left-content">
                <h2>Start Monitoring</h2>
                <p>Create your account and build your watchlist.</p>
            </div>
        </div>

        <!-- Right Form Side -->
        <div class="auth-right">
            <div class="auth-form-container">
                <button class="theme-toggle" id="theme-toggle" style="position:absolute; top:20px; right:20px;">
                    <i class="bi bi-moon-stars-fill"></i>
                </button>
                <a href="index.html" class="logo" style="margin-bottom:32px; display:inline-flex;"><i class="bi bi-robot"></i> AI Stock Monitor</a>
                <h2>Create Account</h2>
                <p class="subtitle">Join the future of intelligent investing</p>
                
                <form id="register-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" class="form-control" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" class="form-control" placeholder="name@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <div class="strength-meter" id="strength-meter">
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirm-password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <div class="form-row" style="margin-top:0;">
                        <div class="form-check">
                            <input type="checkbox" id="terms" required>
                            <label for="terms">I agree to the Terms</label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary btn-auth">Create Account</button>
                </form>

                <div class="auth-footer">
                    Already have an account? <a href="login.html">Sign In</a>
                </div>
            </div>
        </div>
    </div>

    <script src="js/register.js"></script>
    <script src="js/index.js"></script> <!-- Re-used for theme -->
</body>
</html>
